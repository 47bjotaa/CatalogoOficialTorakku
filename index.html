<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Torakku - Repuestos Sprinter</title>

    <style>
        :root {
            --primary-blue: #d10000;
            --secondary-blue: #ff3b3b;
            --dark-bg: #000;
            --light-bg: #f8f9fa;
            --white: #fff;
            --whatsapp: #25d366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(180deg, #d10000 0%, #ea2424 50%, #ea922f 100%);
            background-attachment: fixed;
            background-size: cover;
            color: #333;
            margin: 0;
        }

        /* PANTALLA INICIAL */
        .welcome-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--dark-bg);
            border-bottom: 10px solid var(--primary-blue);
            text-align: center;
        }

        .brand-name {
            font-size: clamp(3rem, 12vw, 7rem);
            font-weight: 900;
            color: white;
            letter-spacing: -2px;
            text-transform: uppercase;
            line-height: .8;
        }

        .brand-name span { color: var(--primary-blue); }

        .brand-subtitle {
            font-size: 1.1rem;
            color: var(--secondary-blue);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 15px;
        }

        /* FILTROS */
        .filter-nav {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, .98);
            backdrop-filter: blur(5px);
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,.1);
        }

        .filter-btn {
            padding: 10px 18px;
            border: 2px solid var(--primary-blue);
            background: transparent;
            color: var(--primary-blue);
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: .3s;
            text-transform: uppercase;
            font-size: .8rem;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--primary-blue);
            color: white;
        }

        #searchInput {
            width: 100%;
            max-width: 400px;
            padding: 12px;
            border: 2px solid var(--primary-blue);
            border-radius: 4px;
            outline: none;
        }

        /* GRID */
        .catalog-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: .3s;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        .card-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 10px;
            background: #f0f0f0;
            padding: 2px 8px;
            border-radius: 10px;
            color: #666;
        }

        .card-img {
            width: 100%;
            height: 180px;
            object-fit: contain;
            margin-bottom: 15px;
            background: #fafafa;
        }

        .card-title {
            font-size: .95rem;
            font-weight: 700;
            margin-bottom: 15px;
            min-height: 50px;
            text-transform: uppercase;
        }

        .btn-wa {
            background: #1a1a1a;
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 12px;
            font-size: .8rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            border: none;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            border-radius: 10px;
            text-align: center;
            position: relative;
        }

        #modalPrecio {
            font-size: 32px;
            font-weight: 900;
            color: var(--primary-blue);
            margin: 15px 0;
        }

        .btn-whatsapp-modal {
            background: var(--whatsapp);
            color: white;
            padding: 15px;
            display: block;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 20px;
        }

        .hidden { display: none; }
        footer { padding: 60px 20px; background: black; color: white; text-align: center; }
    </style>
</head>
<body>

<div id="modalProducto" class="modal">
    <div class="modal-content">
        <span style="position:absolute; top:10px; right:15px; cursor:pointer; font-weight:bold;" onclick="cerrarModal()">✕</span>
        <img id="modalImg" style="width:100%; height:200px; object-fit:contain;">
        <h2 id="modalNombre"></h2>
        <div id="modalPrecio"></div>
        <p style="font-size: 0.9rem; color: #666;">Disponibilidad inmediata para entrega.</p>
        <a id="btnWspDinamico" href="#" target="_blank" class="btn-whatsapp-modal">CONSULTAR POR WHATSAPP</a>
    </div>
</div>

<section class="welcome-screen">
    <h1 class="brand-name">TORA<span>KK</span>U</h1>
    <div class="brand-subtitle">Importaciones & Servicios</div>
    <div style="color:white; margin-top:20px; animation: bounce 2s infinite;">DESCUBRE EL CATÁLOGO ↓</div>
</section>

<nav class="filter-nav" id="catalog-nav">
    <button class="filter-btn active" onclick="filter('all')">Todos</button>
    <button class="filter-btn" onclick="filter('313')">Sprinter 313</button>
    <button class="filter-btn" onclick="filter('515')">Sprinter 515-516</button>
    <input type="text" id="searchInput" onkeyup="filter()" placeholder="Busca tu repuesto...">
    <div id="contador" style="width:100%; text-align:center; font-size:12px; margin-top:5px;"></div>
</nav>

<section class="catalog-container" id="catalogContainer"></section>

<footer>
    <div style="font-size:1.8rem;font-weight:900;margin-bottom:10px;">TORAKKU</div>
    <p>Chile | Repuestos Mercedes-Benz Sprinter</p>
    <p>+56 9 43592844</p>
</footer>

<script>
// BASE DE COSTOS (Lo que tú pagas)
const costosBase = {
    "Filtro de Aire 313": 15000, "Filtro de combustible 313": 18500, "Filtro de aceite 313": 7500,
    "Filtro de polvo 313": 12000, "Valvula de vacio turbo 313": 45000, "Correa de ventilador 313": 15000,
    "Tensor de correa 313": 38000, "Bomba de agua 313": 55000, "Radiador 313": 95000,
    "Amortiguadores Traseros 313": 45000, "Amortiguadores Delanteros 313": 65000,
    "Pastillas de frenos delanteros 313": 25000, "Turbo 313": 450000,
    "Filtro combustible 515-516": 21000, "Filtro aire 515-516": 19000, "Filtro racor 515-516": 15000,
    "Turbo 515-516": 680000, "Bomba agua 515-516": 85000, "Radiador 515-516": 145000,
    "Pastillas freno 515-516": 32000, "Masa delantera 515-516": 110000
    // El sistema calculará automáticamente el 30% sobre cualquier nombre que coincida aquí.
};

const productos = [
    {modelo:"313",nombre:"Filtro de Aire 313",imagen:"./img/filtro-aire-313.png"},
    {modelo:"313",nombre:"Filtro de combustible 313",imagen:"img/filtro-combustible-313.jpg"},
    {modelo:"313",nombre:"Filtro de aceite 313",imagen:"img/filtro-aceite-313.jpg"},
    {modelo:"313",nombre:"Filtro de polvo 313",imagen:"img/filtro-polvo-313.jpg"},
    {modelo:"313",nombre:"Valvula de vacio turbo 313",imagen:"img/valvula-vacio-turbo-313.jpg"},
    {modelo:"313",nombre:"Correa de ventilador 313",imagen:"img/correa-ventilador-313.jpg"},
    {modelo:"313",nombre:"Tensor de correa 313",imagen:"img/tensor-correa-313.jpg"},
    {modelo:"313",nombre:"Viscoso 313",imagen:"img/viscoso-313.jpg"},
    {modelo:"313",nombre:"Bomba de agua 313",imagen:"img/bomba-agua-313.jpg"},
    {modelo:"313",nombre:"Radiador 313",imagen:"img/radiador-313.jpg"},
    {modelo:"313",nombre:"Amortiguadores Traseros 313",imagen:"img/amortiguadores-traseros-313.jpg"},
    {modelo:"313",nombre:"Pastillas de frenos delanteros 313",imagen:"img/pastillas-freno-delantero-313.jpg"},
    {modelo:"313",nombre:"Turbo 313",imagen:"img/turbo-313.jpg"},
    {modelo:"515",nombre:"Filtro combustible 515-516",imagen:"img/filtro-combustible-515.jpg"},
    {modelo:"515",nombre:"Filtro aire 515-516",imagen:"img/filtro-aire-515.jpg"},
    {modelo:"515",nombre:"Filtro racor 515-516",imagen:"img/filtro-racor-515.jpg"},
    {modelo:"515",nombre:"Bomba agua 515-516",imagen:"img/bomba-agua-515.jpg"},
    {modelo:"515",nombre:"Radiador 515-516",imagen:"img/radiador-515.jpg"},
    {modelo:"515",nombre:"Pastillas freno 515-516",imagen:"img/pastillas-515.jpg"},
    {modelo:"515",nombre:"Turbo 515-516",imagen:"img/turbo-515.jpg"},
    {modelo:"515",nombre:"Masa delantera 515-516",imagen:"img/masa-delantera-515.jpg"}
];

function generarCatalogo() {
    const container = document.getElementById("catalogContainer");
    productos.forEach(p => {
        const card = document.createElement("div");
        card.className = "card";
        card.setAttribute("data-model", p.modelo);
        card.innerHTML = `
            <span class="card-tag">SPRINTER ${p.modelo}</span>
            <img class="card-img" src="${p.imagen}" onerror="this.src='https://via.placeholder.com/150?text=Torakku'">
            <h3 class="card-title">${p.nombre}</h3>
            <button class="btn-wa" onclick="verProducto('${p.nombre}','${p.imagen}')">VER DETALLES</button>
        `;
        container.appendChild(card);
    });
}

function verProducto(nombre, imagen) {
    const modal = document.getElementById("modalProducto");
    let precioMostrado = "Consultar";
    
    // Cálculo automático: Costo + 30%
    if(costosBase[nombre]) {
        const precioVenta = Math.round(costosBase[nombre] * 1.30);
        precioMostrado = "$" + precioVenta.toLocaleString('es-CL');
    }

    document.getElementById("modalNombre").innerText = nombre;
    document.getElementById("modalImg").src = imagen;
    document.getElementById("modalPrecio").innerText = precioMostrado;
    
    // Configurar el link de WhatsApp
    const mensaje = encodeURIComponent(`Hola Torakku, me interesa el repuesto: ${nombre} (${precioMostrado})`);
    document.getElementById("btnWspDinamico").href = `https://wa.me/56989063529?text=${mensaje}`;
    
    modal.style.display = "flex";
}

function cerrarModal() { document.getElementById("modalProducto").style.display = "none"; }

function filter(model) {
    const search = document.getElementById("searchInput").value.toLowerCase();
    const cards = document.querySelectorAll(".card");
    let visibles = 0;

    cards.forEach(card => {
        const title = card.querySelector(".card-title").textContent.toLowerCase();
        const modelCard = card.getAttribute("data-model");
        const matchModel = (model === 'all' || !model || modelCard === model);
        const matchSearch = title.includes(search);

        if (matchModel && matchSearch) {
            card.classList.remove("hidden");
            visibles++;
        } else {
            card.classList.add("hidden");
        }
    });
    document.getElementById("contador").innerText = visibles + " repuestos encontrados";
}

window.onload = () => {
    generarCatalogo();
    filter('all');
};
</script>
</body>
</html>
